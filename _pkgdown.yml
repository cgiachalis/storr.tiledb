#url: https://cgiachalis.github.io/storr.tiledb/
template:
  bootstrap: 5
  bootswatch: zephyr
  bslib:
    base_font: {google: "Rubik"}
    heading_font: {google: "Roboto Slab"}
    primary: "#090D14"
    link-color: "#1C4BC4ED"
    code-color: "#5D4311"
    text-decoration-color: "#151B21"
    body-color: "#1B222B" # Black Perl

home:
  sidebar:
    structure:
    - links
    - project
    - license
    - community
    - citation
    - authors
    - dev
    components:
      project:
        title: Related Software
        text: |
          [R6.TileDB](https://cgiachalis.github.io/R6.tiledb/) <br>
          [TileDB-R](https://tiledb-inc.github.io/TileDB-R/) <br>
          [TileDB Embedded](https://github.com/TileDB-Inc/TileDB)


navbar:
  title: "storr.tiledb"
  left:
  - text: ~
    href: index.html
    icon: fa-home fa-lg
    aria-label: storr.tiledb
  - text: Getting Started
    href: articles/getting_started.html
  - text: Reference
    href: reference/index.html
  - text: Articles
    menu:
    - text: "storr.tiledb"
    - text: "Introduction"
      href: articles/introduction.html
  - text: "News"
    href: news/index.html

reference:

- title: Storr Interface
  desc: |
   A convenient wrapper to create and manage a 'storr' using TileDB
   storage engine. For most cases, it will be the go to function.
  contents:
  - storr_tiledb

- title: Storr Driver
  desc: ~
  contents:
  - starts_with("driver")

- title: R6 Classes
  desc: |
   R6 classes that represent the storr interface and the TileDB driver.
   These are internal objects and it is not advisable to use them directly;
   but exposed here for documentation purposes.
  contents:
  - CAS
  - TileDBDriver
  - TileDBStorr
