reference:

- title: Storr Interface
  desc: |
   Use the following function to create and work with a 'storr',
   a key-value store that uses TileDB for storage (backend).
  contents:
  - storr_tiledb


- subtitle: TileDB Driver
  desc: |
   Create and/or open a TileDB driver with `driver_tiledb`. The rest
   routines are utilities to create only, copy, move or rename an existing storr.
  contents:
   - driver_tiledb

- title: R6 Classes
  desc: |
   R6 classes that represent the storr interface and TileDB driver.
   These are internal objects and should not be used directly.
  contents:
  - CAS
  - TileDBDriver
  - TileDBStorr
  - StorrFragments
